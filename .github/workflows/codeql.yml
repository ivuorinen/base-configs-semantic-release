---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 1 * * 0"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read # to read Actions run and workflow metadata
      contents: read # to check out the repository
      packages: read # to download packages when needed by analysis
      security-events: write # to upload SARIF results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "javascript"]
    steps:
      - name: CodeQL Analysis
        uses: ivuorinen/actions/codeql-analysis@8395dad6b7d5d7d2e1d016cac1eede33ab404a3c # v2026.06.18
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
